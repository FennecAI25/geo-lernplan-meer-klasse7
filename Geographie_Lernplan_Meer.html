<script>
const DAYS = [

    {type:"pause",time:"12–14 min",text:"Pause"},

const TOPICS = [
  {st:"Station 2",title:"Küstenformen",keys:["Fjordküste","Schärenküste","Deltaküste","Flachküste","Eiszeit","Sediment"],tip:"Merke: Fjord & Schäre = Eiszeit im Norden. Delta & Flach = Sediment/Strömung.",body:`<ul>
<li><strong>Fjordküste</strong> (Norwegen): Gletscher erodierten tiefe U-Täler → Eis schmilzt → Meer läuft ein. Steile Felswände, tief. Nutzung: Lachszucht, Tourismus.</li>
<li><strong>Schärenküste</strong> (Schweden): Gletscher schliffen Felsen flach ab → kleine runde Inseln. Nutzung: Baden, Kajak, Tourismus.</li>
<li><strong>Deltaküste</strong> (Donau/Rumänien): Fluss trägt Sediment ins Meer → Delta wächst. Schwebebstoffe trüben Wasser. Nutzung: Naturschutz, Angeln.</li>
<li><strong>Flachküste/Hakenküste</strong> (Niederlande): Sturmfluten, Deiche, Polder. IJsselmeer = 29 km langer Abschlussdeich. Nutzung: Landwirtschaft, Schifffahrt.</li>
<li><strong>Nur im Norden:</strong> Fjord- und Schärenküsten entstehen durch Gletschererosion → Skandinavien war in der Eiszeit stark vergletschert, Südeuropa nicht.</li>
</ul>`},
  {st:"Station 3",title:"Überfischung",keys:["Fabrikschiff","Plankton","Beifang","MSC-Siegel","Fangquoten","Schonzeiten"],tip:"Flächendiagramm: 3 Zonen – nicht voll genutzt / voll genutzt / überfischt (wächst!)",body:`<ul>
<li><strong>Hochseefischerei seit 1950:</strong> Sonar, Satelliten, Schleppnetze bis 2000 m Tiefe, Fabrikschiffe sortieren & frosten an Bord.</li>
<li><strong>Plankton</strong> = Basis der Nahrungskette, lebt in den obersten 200 m.</li>
<li><strong>Überfischung:</strong> Bestände erholen sich nicht → Artenvielfalt sinkt → Ökosystem kollabiert.</li>
<li><strong>Beifang:</strong> Jungfische & ungewollte Arten werden mitgefangen und getötet.</li>
<li><strong>Flächendiagramm 1976–2015:</strong> Anteil überfischter Bestände steigt von ~10% auf >30%. Anteil "nicht voll genutzt" sinkt stark.</li>
<li><strong>Lösungen EU:</strong> Fangquoten, Maschenweite, Schonzeiten, Schutzgebiete. MSC-Siegel (1997, WWF/Unilever) für nachhaltigen Fischfang.</li>
</ul>`},
  {st:"Station 4",title:"Aquakultur",keys:["Käfignetz","Aquaponics","ASC-Siegel","Kreislauf","Antibiotika","Containerfarm"],tip:"Aquakultur entlastet Wildfang, löst das Problem aber nicht allein.",body:`<ul>
<li><strong>Aquakultur</strong> = kontrollierte Aufzucht lebender Organismen (Fisch, Krebse, Algen) im Wasser.</li>
<li><strong>Käfignetze</strong> (Fjorde Norwegens): Lachse in quasi-natürlicher Umgebung, einfach "geerntet".</li>
<li><strong>Problem:</strong> Enge → Seuchen, Parasiten → Antibiotika/Pestizide → gelangen in Nahrungskette. Überdüngung.</li>
<li><strong>Futterproblem:</strong> 1,2 kg Kleinfisch → 1 kg Lachs. Thunfisch kann nicht nachgezüchtet werden.</li>
<li><strong>Aquaponics:</strong> Kreislaufsystem Fisch + Pflanze (Gewächshaus), geschlossen, sauber – noch teuer.</li>
<li><strong>ASC-Siegel</strong> (2009, WWF): Standards für umweltgerechte Aquakultur, Kritik an Medikamenteneinsatz.</li>
<li><strong>Bilanz:</strong> Aquakultur = 2016 schon fast gleich viel Ertrag wie Wildfang. Kein alleiniges Allheilmittel.</li>
</ul>`},
  {st:"Station 5",title:"Rotterdam / Europoort",keys:["TEU","Container","Güterumschlag","Rhein","Hinterland","Raffinerie"],tip:"Rotterdam: Lage + Tiefe + Hinterland + Infrastruktur = Erfolgsformel",body:`<ul>
<li><strong>Rotterdam</strong> = 11. größter Hafen weltweit (Container), größter Europas. Nordsee, Rheinmündung.</li>
<li><strong>TEU</strong> = Twenty Foot Equivalent Unit (20-Fuß-Container, ~6 m lang).</li>
<li><strong>Standortvorteil:</strong> Tiefes Fahrwasser (24 m), Zugang via Rhein/Maas/Schiene/Pipeline zu ganz Westeuropa.</li>
<li><strong>Güterumschlag Europoort:</strong> Erdöl 48%, Schüttgut 30%, Container 20%, Sonstiges 10%.</li>
<li><strong>5 Raffinerien</strong> direkt im Hafen, Pipeline-Netz zu Deutschland & weiter. 180.000 Arbeitsplätze.</li>
<li><strong>Vergleich Bamberg–Rotterdam:</strong> Schiff = 180 € statt 816 € per Lkw (fast 5× billiger pro Container).</li>
<li><strong>Größte Container-Schiffe:</strong> OOCL Hongkong – 400 m lang, 59 m breit, 21.000 TEU.</li>
</ul>`},
  {st:"Station 6",title:"Nordsee-Rohstoffe",keys:["Troll A","Pipeline","Offshore","Raffinerie","Tanker","Erdgasfeld"],tip:"Säulendiagramm: Saudi-Arabien steigt, Norwegen sinkt (1996→2016).",body:`<ul>
<li><strong>Nordsee</strong> = größtes Offshore-Fördergebiet Europas, >500 Plattformen.</li>
<li><strong>Troll A</strong> (Norwegen): höchste Plattform der Welt (472 m), 100 km NW von Bergen, entdeckt 1979.</li>
<li><strong>Förderung:</strong> Erkundung via Sprengung → Probebohrungen → Förderung mit Bohrmeißel.</li>
<li><strong>Transport:</strong> Rohöl per Tanker oder Unterwasser-Pipeline → Festland → Raffinerie (UK, Norwegen, D).</li>
<li><strong>Gefahren:</strong> Tankerunglücke, Lecks, Bohrfehler → Ölpest, Tod von Meereslebewesen, Strandverschmutzung.</li>
<li><strong>Tabelle 4 (wichtigste Werte):</strong> Saudi-Arabien 445→586, Russland 303→554, USA 382→543, Norwegen 155→90 (sinkt!).</li>
<li>Nordsee ist endlich – Alternativen (Windkraft) gewinnen an Bedeutung.</li>
</ul>`},
  {st:"Station 7",title:"Tourismus / Mallorca",keys:["Massentourismus","Tourismussteuer","Balearen","Mittelmeerklima","nachhaltig","Overtourismus"],tip:"Klimadiagramm Palma: heiß-trockener Sommer, milde Winter = Mittelmeerklima.",body:`<ul>
<li><strong>Mallorca:</strong> 3.640 km², 859.300 Einwohner, aber 45,7 Mio. Übernachtungen (2017)!</li>
<li><strong>Mittelmeerklima:</strong> Trocken-heiß im Sommer (Juli ~29°C, kaum Regen), mild im Winter.</li>
<li><strong>Positive Effekte:</strong> Arbeitsplätze, Wirtschaftseinnahmen, Infrastruktur.</li>
<li><strong>Negative Effekte:</strong> Lärm, Müll, Wasserknappheit, Flächenverbrauch, steigende Immobilienpreise, Umweltschäden.</li>
<li><strong>Tourismussteuer</strong> ab 01.07.2016: Balearen-Parlament beschließt Steuer pro Übernachtung → Einnahmen für "grüne Projekte" / Nachhaltigkeit.</li>
<li><strong>Nachhaltiger Tourismus:</strong> Naturschutz, Individualtourismus, lokale Wirtschaft stärken.</li>
<li><strong>Mittelmeer-Karte:</strong> Frankreich, Spanien, Italien, Türkei = höchste Tourismus-Einkünfte.</li>
</ul>`},
  {st:"Station 8",title:"Wattenmeer",keys:["UNESCO","CWSS","trilateral","Wattenmeerplan","Nationalpark","Ökosystem"],tip:"3 Staaten – Niederlande 30%, Deutschland 60%, Dänemark 10%.",body:`<ul>
<li><strong>Wattenmeer:</strong> 11.500 km², größtes Wattenmeer der Welt, UNESCO-Weltnaturerbe seit 2009.</li>
<li><strong>Anteile:</strong> NL 30% / D 60% / DK 10%. Über 200 UNESCO-Weltnaturerbstätten.</li>
<li><strong>Bedeutung:</strong> Lebensraum (Vögel, Fische, Robben), Nahrungsquelle, Tourismus, Bodenschätze.</li>
<li><strong>Gefahren:</strong> Ölverschmutzung, Abwasser, Überfischung, Tourismus, Windkraftausbau.</li>
<li><strong>Trilaterale Zusammenarbeit seit 1978:</strong> NL, D, DK kooperieren. 1985: CWSS gegründet. 1997 & 2010: Wattenmeerplan.</li>

let doneDays = new Set();
let qIdx = 0, score = 0, answered = false, shuffled = [];

function showPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function updateCountdown() {
  const exam = new Date('2026-07-02T08:00:00');
  const now = new Date();
  const diff = Math.ceil((exam - now) / (1000*60*60*24));
  const el = document.getElementById('countdown');
  if(diff > 0) el.textContent = '📅 Noch ' + diff + ' Tag' + (diff===1?'':'e') + ' bis zur Schulaufgabe (Do, 02.07.2026)';
  else if(diff === 0) el.textContent = '🎯 Heute ist die Schulaufgabe – viel Erfolg!';
  else { el.style.background = '#e8f5e9'; el.style.color = '#1a4731'; el.style.borderColor='#a5d6a7'; el.textContent = '✓ Die Schulaufgabe ist vorbei – gut gemacht!'; }
}

function buildDays() {
  const c = document.getElementById('days-container');
  DAYS.forEach((d, i) => {
    const isLast = i === DAYS.length - 1;
    const div = document.createElement('div');
    div.className = 'day-card';
    const badges = `<span class="badge badge-date">${d.date}</span><span class="badge badge-st">${d.st}</span>`;
    const sess = d.sessions.map(s =>
      `<div class="session"><span class="stime">${s.time}</span><span class="sblock ${s.type}">${s.text}</span></div>`
    ).join('');
    div.innerHTML = `<div class="day-header">${badges}<span class="day-title">${d.title}</span><button class="done-btn" id="done-${i}" onclick="markDone(${i})">✓ Erledigt</button></div>${sess}`;
    c.appendChild(div);
  });
  const exam = document.createElement('div');
  exam.className = 'day-card';
  exam.innerHTML = `<div class="day-header"><span class="badge badge-exam">Do, 02.07.</span><span class="day-title" style="font-weight:600;color:#9B1C1C">🎯 SCHULAUFGABE – Geographie Klasse 7</span></div><div class="session"><span class="stime">Schule</span><span class="sblock lern">Gut ausgeschlafen, Stift & Lineal dabei – du bist vorbereitet!</span></div>`;
  c.appendChild(exam);
}

function markDone(i) {
  const btn = document.getElementById('done-' + i);
  if(doneDays.has(i)) { doneDays.delete(i); btn.classList.remove('done'); btn.textContent = '✓ Erledigt'; }
  else { doneDays.add(i); btn.classList.add('done'); btn.textContent = '✓ Fertig!'; }
  const pct = Math.round(doneDays.size / DAYS.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = doneDays.size + ' von ' + DAYS.length + ' Einheiten erledigt';
  document.getElementById('prog-pct').textContent = pct + '%';
}

function buildTopics() {
  const c = document.getElementById('topics-container');
  TOPICS.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'topic-card';
    const kws = t.keys.map(k => `<span class="kw">${k}</span>`).join('');
    div.innerHTML = `<div class="topic-hdr" onclick="toggleTopic(${i})">
      <span class="st-tag">${t.st}</span>
      <span class="ttitle">${t.title}</span>
      <span class="chev" id="chev-${i}">▸</span>
    </div>
    <div class="topic-body" id="tbody-${i}">
      <div class="kw-wrap">${kws}</div>
      ${t.body}
      <div class="tip-box">💡 Merke: ${t.tip}</div>
    </div>`;
    c.appendChild(div);
  });
}

function toggleTopic(i) {
  const b = document.getElementById('tbody-' + i);
  const ch = document.getElementById('chev-' + i);
  b.classList.toggle('open');
  ch.textContent = b.classList.contains('open') ? '▾' : '▸';
}

function buildExercises() {
  const c = document.getElementById('exercises-container');
  EXERCISES.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'ex-card';
    div.innerHTML = `<div class="ex-num">Aufgabe ${e.num}</div>
      <div class="ex-q">${e.q}</div>
      <div class="ex-hint">💡 Tipp: ${e.hint}</div>
      <button class="show-btn" onclick="toggleAns(${i}, this)">Musterlösung anzeigen</button>
      <div class="answer" id="ans-${i}"><strong>Musterlösung:</strong><br><br>${e.ans}</div>`;
    c.appendChild(div);
  });
}

function toggleAns(i, btn) {
  const a = document.getElementById('ans-' + i);
  a.classList.toggle('open');
  btn.textContent = a.classList.contains('open') ? 'Musterlösung verbergen' : 'Musterlösung anzeigen';
}

function shuffle(arr) { return arr.slice().sort(() => Math.random() - 0.5); }

function initQuiz() { shuffled = shuffle(QUIZ); qIdx = 0; score = 0; answered = false; renderQ(); }

function renderQ() {
  if(qIdx >= shuffled.length) { showScore(); return; }
  const q = shuffled[qIdx];
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-counter').textContent = 'Frage ' + (qIdx+1) + ' von ' + shuffled.length;
  document.getElementById('q-score').textContent = score + ' richtig';
  document.getElementById('q-fb').textContent = '';
  answered = false;
  const opts = document.getElementById('q-opts');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'qopt'; b.textContent = o;
    b.onclick = () => selectOpt(i, b, q.a);
    opts.appendChild(b);
  });
}

function selectOpt(i, btn, correct) {
  if(answered) return; answered = true;
  const opts = document.querySelectorAll('.qopt');
  opts.forEach(o => { o.disabled = true; });
  if(i === correct) {
    btn.classList.add('correct'); score++;
    document.getElementById('q-fb').textContent = '✓ Richtig!';
  } else {
    btn.classList.add('wrong');
    opts[correct].classList.add('correct');
    document.getElementById('q-fb').textContent = '✗ Leider falsch – die richtige Antwort ist grün markiert.';
  }
  document.getElementById('q-score').textContent = score + ' richtig';
}

function nextQ() { qIdx++; renderQ(); }

function showScore() {
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('score-box').style.display = 'block';
  const pct = Math.round(score / shuffled.length * 100);
  document.getElementById('score-num').textContent = score + '/' + shuffled.length;
  document.getElementById('score-pct').textContent = pct + '% korrekt';
  let msg;
  if(pct >= 85) msg = '🎉 Ausgezeichnet! Du bist super vorbereitet!';
  else if(pct >= 70) msg = '👍 Gut! Noch 1–2 Themen wiederholen.';
  else if(pct >= 55) msg = '📖 Okay – Zusammenfassung nochmal durchlesen!';
  else msg = '💪 Weitermachen – du schaffst das! Nochmal üben.';
  document.getElementById('score-msg').textContent = msg;
}

function restartQuiz() {
  document.getElementById('quiz-container').style.display = '';
  document.getElementById('score-box').style.display = 'none';
  initQuiz();
}

updateCountdown();
buildDays();
buildTopics();
buildExercises();
initQuiz();
</script>
</body>
</html>
